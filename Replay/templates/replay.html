<!-- 
  League of Legends Match Replay Visualization
  ===========================================
  
  This page provides a visual replay of a League of Legends match, showing:
  - Champion movements on the Summoner's Rift map
  - Combat events and kills
  - Jungle monster kills
  - Death and respawn timers
  - Interactive timeline control
  
  TODO:
  - Implement death respawn at base (treat as new event)
  - Hide champion icon during death
-->

<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>LoL Jungle Tracker - Replay</title>
  <!-- Include p5.js for canvas-based visualization -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.2/p5.min.js"></script>
  
  <!-- 
    Custom CSS styles for the replay visualization
    - Dark theme with modern UI elements
    - Responsive layout with flexbox
    - Interactive controls and event log
  -->
  <style>
  body {
    display: flex;
    margin: 0;
    background: #111;
    color: white;
    height: 100vh;
    overflow: hidden;
  }

  #log {
    width: 300px;
    max-height: calc(100vh - 50px);
    padding: 10px;
    overflow-y: auto;
    font-family: monospace;
    background: #1a1a1a;
    border-right: 2px solid #333;
  }

  #controls {
    position: absolute;
    bottom: 10px;
    left: 320px;
    padding: 10px;
    background: #1a1a1a;
    border: 2px solid #333;
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .header {
    position: absolute;
    top: 10px;
    left: 320px;
    display: flex;
    align-items: center;
    gap: 20px;
  }

  .back-button {
    padding: 8px 16px;
    background: #2c2f33;
    border: none;
    border-radius: 8px;
    color: white;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .back-button:hover {
    background: #36393f;
  }

  canvas {
    display: block;
    background: #000;
  }

  #stats {
    width: 340px;
    max-height: calc(100vh - 20px);
    margin: 10px 10px 10px auto;
    padding: 10px;
    overflow-y: auto;
    font-family: monospace;
    background: #1a1a1a;
    border-left: 2px solid #333;
  }

  .stats-team-title {
    font-weight: bold;
    margin-top: 10px;
    margin-bottom: 4px;
  }

  .stats-row {
    display: grid;
    grid-template-columns: 1fr auto auto auto auto;
    gap: 8px;
    padding: 2px 0;
    border-bottom: 1px solid #2a2a2a;
    font-size: 12px;
  }

  .stats-header {
    color: #aaa;
    font-size: 11px;
  }
</style>
</head>
<body>
  <div id="log"><b>📜 Event Log</b><br /></div>
  <div class="header">
    <button class="back-button" onclick="window.location.href='/matches.html'">← Back to Matches</button>
  </div>
  <div id="controls">
    <button id="playPauseBtn" onclick="togglePlayPause()">Pause</button>
    <input type="range" id="timeSlider" min="0" max="1000" value="0">
    <label for="timeSlider">Game Time: <span id="sliderTime">0:00</span></label>
  </div>
  <div id="stats"><b>Player Stats</b><br />Loading...</div>

<script>
let champIconMap = {};
let championNames = new Set();
let champMap = {};
let junglerData = [];
let events = [];
let mapImg;
let scaleFactor;
const mapSize = 1024;
const canvasSize = 910;
let currentGameTime = 0;
let maxGameTime = 0;
let lastTickTime = 0;
const tickInterval = 1000 / 60; // 60 FPS
const gameTimePerTick = 0.1; // 100ms increments
const matchId = new URLSearchParams(window.location.search).get("matchId");
const displayedEvents = new Set();
let isPlaying = true;
let deathWindowsByPid = {}; // participantId -> [{ deathTime, respawnTime, team }]
let participantsById = {};
let lastRenderedCanvasPosByPid = {}; // participantId -> { x, y, wasDeadVisual, t }
let movementSegments = []; // [{ x1, y1, x2, y2, createdAt }]
const MOVEMENT_SEGMENT_TTL = 20; // in game-seconds

function msToMinSec(ms) {
  const m = Math.floor(ms / 60000);
  const s = Math.floor((ms % 60000) / 1000);
  return `${m}:${s.toString().padStart(2, '0')}`;
}

function secondsToMinSec(seconds) {
  const m = Math.floor(seconds / 60);
  const s = Math.floor(seconds % 60);
  return `${m}:${s.toString().padStart(2, '0')}`;
}

function label(champ) {
  return champ.team === "Blue" ? `🔵 ${champ.name}` : `🔴 ${champ.name}`;
}

function timeToSeconds(timeStr) {
  const [minutes, seconds] = timeStr.split(':').map(Number);
  return minutes * 60 + seconds;
}

function calculateRespawnTime(level, gameMinutes) {
  // Base Respawn Window (BRW) values from LoL wiki
  const BRW = [-1, 10, 10, 12, 12, 14, 16, 20, 25, 28, 32.5, 35, 37.5, 40, 42.5, 45, 47.5, 50, 52.5];
  const base_timer = BRW[level];

  // Apply Time Impact Factor (TIF)
  let tif = 0;
  if (gameMinutes < 15) {
    tif = 0; // No TIF for 0–14:59
  } else if (gameMinutes < 30) {
    tif = Math.ceil(2 * (gameMinutes - 15)) * 0.425 / 100;
  } else if (gameMinutes < 45) {
    tif = 12.75 + Math.ceil(2 * (gameMinutes - 30)) * 0.30 / 100;
  } else {
    tif = 21.75 + Math.ceil(2 * (gameMinutes - 45)) * 1.45 / 100;
  }

  // Total timer = BRW * (1 + TIF)
  return Math.round(base_timer * (1 + tif));
}

function togglePlayPause() {
  isPlaying = !isPlaying;
  document.getElementById('playPauseBtn').textContent = isPlaying ? 'Pause' : 'Play';
}

function getBasePosition(team) {
  return team === "Blue" ? { x: 554, y: 581 } : { x: 14500, y: 14511 };
}

function isNearBaseCanvasPosition(x, y, team) {
  const base = getBasePosition(team);
  const baseX = (base.x / 15000) * mapSize * scaleFactor;
  const baseY = ((15000 - base.y) / 15000) * mapSize * scaleFactor;
  return Math.hypot(x - baseX, y - baseY) <= 22;
}

function getLatestPointAtOrBefore(points, t) {
  let latest = null;
  for (const point of points) {
    if (point.timeSeconds <= t) latest = point;
    else break;
  }
  return latest;
}

function getFirstPointAfter(points, t) {
  for (const point of points) {
    if (point.timeSeconds > t) return point;
  }
  return null;
}

function getActiveDeathWindow(participantId, t) {
  const windows = deathWindowsByPid[participantId] || [];
  for (const window of windows) {
    if (t >= window.deathTime && t < window.respawnTime) return window;
  }
  return null;
}

function getMostRecentRespawnWindow(participantId, t) {
  const windows = deathWindowsByPid[participantId] || [];
  let best = null;
  for (const window of windows) {
    if (window.respawnTime <= t) best = window;
    else break;
  }
  return best;
}

function getLatestRelevantEventPosition(participantId, t) {
  let latest = null;
  for (const e of events) {
    if (!e.position || e.timeSeconds > t) continue;
    if (e.type === "RESPAWN" && e.participantId === participantId) {
      latest = e;
      continue;
    }
    if (e.type === "CHAMPION_KILL") {
      const involved =
        e.killerId === participantId ||
        e.victimId === participantId ||
        (e.assistingParticipantIds || []).includes(participantId);
      if (involved) latest = e;
      continue;
    }
    if (e.type === "ASSIST" && (e.assistingParticipantIds || []).includes(participantId)) {
      latest = e;
      continue;
    }
    if (e.type === "ELITE_MONSTER_KILL" && e.killerId === participantId) {
      latest = e;
    }
  }
  return latest;
}

function participantJitterSeed(participantId) {
  // Deterministic small seed so overlapping icons spread consistently.
  const n = Number(participantId) || 0;
  return (n * 2654435761) >>> 0;
}

function buildLiveKdaByParticipant(t) {
  const kda = {};
  for (const participantId of Object.keys(participantsById)) {
    kda[participantId] = { k: 0, d: 0, a: 0 };
  }
  for (const e of events) {
    if (e.type !== "CHAMPION_KILL" || e.timeSeconds > t) continue;
    if (kda[e.killerId]) kda[e.killerId].k += 1;
    if (kda[e.victimId]) kda[e.victimId].d += 1;
    for (const assisterId of (e.assistingParticipantIds || [])) {
      if (kda[assisterId]) kda[assisterId].a += 1;
    }
  }
  return kda;
}

function renderStatsPanel(grouped) {
  const statsDiv = document.getElementById("stats");
  const liveKda = buildLiveKdaByParticipant(currentGameTime);
  const blueRows = [];
  const redRows = [];

  for (const [pidStr, champ] of Object.entries(champMap)) {
    const points = grouped[pidStr] || [];
    const latest = getLatestPointAtOrBefore(points, currentGameTime);
    const kda = liveKda[pidStr] || { k: 0, d: 0, a: 0 };
    const row = {
      name: champ.name,
      level: latest ? latest.level : 1,
      cs: latest ? latest.cs : 0,
      gold: latest ? latest.gold : 0,
      kda: `${kda.k}/${kda.d}/${kda.a}`,
    };
    if (champ.team === "Blue") blueRows.push(row);
    else redRows.push(row);
  }

  const renderRows = (rows) => rows
    .sort((a, b) => a.name.localeCompare(b.name))
    .map((r) => `
      <div class="stats-row">
        <span>${r.name}</span>
        <span>Lv ${r.level}</span>
        <span>CS ${r.cs}</span>
        <span>${r.gold}g</span>
        <span>${r.kda}</span>
      </div>
    `)
    .join("");

  statsDiv.innerHTML = `
    <b>Player Stats</b><br />
    <div class="stats-row stats-header">
      <span>Champion</span><span>Level</span><span>CS</span><span>Gold</span><span>K/D/A</span>
    </div>
    <div class="stats-team-title">Blue Team</div>
    ${renderRows(blueRows)}
    <div class="stats-team-title">Red Team</div>
    ${renderRows(redRows)}
  `;
}

function preload() {
  mapImg = loadImage('/static/SRMap.png');
}

async function fetchData() {
  try {
    const params = new URLSearchParams(window.location.search);
    const matchId = params.get("matchId");
    const apiKey = sessionStorage.getItem('riot_api_key');

    if (!matchId) {
      console.error("Missing matchId. Please start over from the lookup page.");
      document.getElementById('log').innerHTML = '<b>❌ Error</b><br />Missing matchId. Please start over from the lookup page.';
      return;
    }

    const requestParams = new URLSearchParams();
    if (apiKey) {
      requestParams.set("api_key", apiKey);
    }
    const res = await fetch(`/api/match/${matchId}?${requestParams.toString()}`);
    if (!res.ok) {
      throw new Error(`Failed to fetch match data: ${res.status}`);
    }
    const { metadata, timeline } = await res.json();

    if (!metadata || !timeline) {
      throw new Error('Invalid match data received');
    }

    champMap = {};
    for (const p of metadata.info.participants) {
      const name = p.championName;
      champMap[p.participantId] = {
        name,
        team: p.teamId === 100 ? "Blue" : "Red"
      };
      participantsById[p.participantId] = p;
      championNames.add(name);
      deathWindowsByPid[p.participantId] = [];
    }

    for (let name of championNames) {
      let patchVersion = "15.11.1";
      try {
        const res = await fetch("https://ddragon.leagueoflegends.com/api/versions.json");
        const versions = await res.json();
        patchVersion = versions[0];
      } catch (e) {
        console.warn("Failed to fetch patch version. Using fallback:", patchVersion);
      }
      champIconMap[name] = await new Promise((resolve) => {
        loadImage(`https://ddragon.leagueoflegends.com/cdn/${patchVersion}/img/champion/${name}.png`, resolve);
      });
    }

    for (const frame of timeline.info.frames) {
      const timeSec = frame.timestamp / 1000;
      if (timeSec > maxGameTime) maxGameTime = timeSec;
      for (const [pid, pf] of Object.entries(frame.participantFrames)) {
        if (!pf.position) continue;
        junglerData.push({
          id: parseInt(pid),
          time: msToMinSec(frame.timestamp),
          timeSeconds: timeSec,
          x: pf.position.x,
          y: pf.position.y,
          level: pf.level || 1,
          cs: (pf.minionsKilled || 0) + (pf.jungleMinionsKilled || 0),
          gold: pf.currentGold || 0
        });
      }
    }

    for (const frame of timeline.info.frames) {
      const timeSec = frame.timestamp / 1000;
      const gameMinutes = Math.floor(timeSec / 60);
      for (const event of frame.events || []) {
        const type = event.type;
        const eventTimeSec = event.timestamp / 1000;
        const eventTimeStr = secondsToMinSec(eventTimeSec);
        
        if (type === "CHAMPION_KILL") {
          const killer = champMap[event.killerId];
          const victim = champMap[event.victimId];
          if (!killer || !victim) continue;
          
          // Add kill event with position and participants
          events.push({ 
            time: eventTimeStr, 
            timeSeconds: eventTimeSec, 
            type: "CHAMPION_KILL",
            position: event.position,
            killerId: event.killerId,
            victimId: event.victimId,
            assistingParticipantIds: event.assistingParticipantIds || [],
            event: `⚔️ ${label(killer)} killed ${label(victim)} at (${event.position?.x}, ${event.position?.y})` 
          });

          // Update death state with accurate respawn time
          const victimLevel = junglerData.find(p => p.id === event.victimId && p.timeSeconds <= eventTimeSec)?.level || 1;
          const respawnTime = calculateRespawnTime(victimLevel, gameMinutes);
          const respawnTimeSec = eventTimeSec + respawnTime;
          const respawnTimeStr = secondsToMinSec(respawnTimeSec * 1000);
          
          // Add respawn event at base position
          const basePos = getBasePosition(champMap[event.victimId].team);
          events.push({
            time: respawnTimeStr,
            timeSeconds: respawnTimeSec,
            type: "RESPAWN",
            position: basePos,
            participantId: event.victimId,
            event: `🔄 ${label(victim)} respawned at base`
          });

          deathWindowsByPid[event.victimId].push({
            deathTime: eventTimeSec,
            respawnTime: respawnTimeSec,
            team: champMap[event.victimId].team,
            deathPosition: event.position || null
          });

          // Add assist events
          for (const a of (event.assistingParticipantIds || [])) {
            const assist = champMap[a];
            if (assist) {
              events.push({ 
                time: eventTimeStr, 
                timeSeconds: eventTimeSec,
                type: "ASSIST",
                position: event.position,
                killerId: event.killerId,
                victimId: event.victimId,
                assistingParticipantIds: event.assistingParticipantIds || [],
                event: `🤝 ${label(assist)} assisted the kill` 
              });
            }
          }
        } else if (type === "ELITE_MONSTER_KILL") {
          const killer = champMap[event.killerId];
          const monster = event.monsterType;
          if (killer) {
            events.push({ time: eventTimeStr, timeSeconds: eventTimeSec, event: `👾 ${label(killer)} killed ${monster} at (${event.position?.x}, ${event.position?.y})` });
          }
        } else if (type === "LEVEL_UP") {
          const champ = champMap[event.participantId];
          const lvl = event.level;
          if (champ && [6, 11, 16].includes(lvl)) {
            events.push({ time: eventTimeStr, timeSeconds: eventTimeSec, event: `🆙 ${label(champ)} leveled up to ${lvl}` });
          }
        }
      }
    }

    console.log("✅ Data loaded:", junglerData.length, "points,", events.length, "events");
    document.getElementById('timeSlider').max = maxGameTime;

  } catch (err) {
    console.error("❌ Failed to load match data:", err);
    document.getElementById('log').innerHTML = `<b>❌ Error</b><br />Failed to load match data: ${err.message}`;
  }
}

async function setup() {
  createCanvas(canvasSize, canvasSize).parent(document.body);
  scaleFactor = canvasSize / mapSize;
  textSize(10);
  textAlign(LEFT);
  lastTickTime = millis();
  
  // Show loading message
  document.getElementById('log').innerHTML = '<b>📜 Loading match data...</b><br />';
  
  await fetchData();

  const slider = document.getElementById('timeSlider');
  slider.addEventListener('input', () => {
    isPlaying = false;
    document.getElementById('playPauseBtn').textContent = 'Play';
    currentGameTime = parseFloat(slider.value);
    document.getElementById('sliderTime').textContent = secondsToMinSec(currentGameTime);
    displayedEvents.clear();
    lastRenderedCanvasPosByPid = {};
    movementSegments = [];
    document.getElementById('log').innerHTML = '<b>📜 Event Log</b><br />';
  });
}

function draw() {
  background(0);

  if (mapImg) image(mapImg, 0, 0, canvasSize, canvasSize);
  else {
    fill(50);
    rect(0, 0, canvasSize, canvasSize);
    fill(255);
    text("Err loading map...", 10, 20);
    return;
  }

  if (isPlaying) {
    const elapsedTime = millis();
    if (elapsedTime - lastTickTime >= tickInterval) {
      currentGameTime += gameTimePerTick;
      lastTickTime = elapsedTime;
      if (currentGameTime > maxGameTime) {
        currentGameTime = 0;
        displayedEvents.clear();
        lastRenderedCanvasPosByPid = {};
        movementSegments = [];
        document.getElementById('log').innerHTML = '<b>📜 Event Log</b><br />';
      }
      document.getElementById('timeSlider').value = currentGameTime;
      document.getElementById('sliderTime').textContent = secondsToMinSec(currentGameTime);
    }
  }

  const grouped = {};
  for (const point of junglerData) {
    if (!grouped[point.id]) grouped[point.id] = [];
    grouped[point.id].push(point);
  }

  const drawCandidates = [];
  for (const [pid, points] of Object.entries(grouped)) {
    const participantId = parseInt(pid);
    const activeDeath = getActiveDeathWindow(participantId, currentGameTime);
    let pos = null;
    let shouldDraw = true;
    let isDeadVisual = false;

    if (activeDeath) {
      // While dead, keep icon fixed at death position and render a dimmed marker style.
      isDeadVisual = true;
      if (activeDeath.deathPosition) {
        pos = { x: activeDeath.deathPosition.x, y: activeDeath.deathPosition.y };
      } else {
        const beforeDeath = getLatestPointAtOrBefore(points, activeDeath.deathTime);
        if (beforeDeath) {
          pos = { x: beforeDeath.x, y: beforeDeath.y };
        }
      }
    } else {
      const latest = getLatestPointAtOrBefore(points, currentGameTime);
      const latestEventPos = getLatestRelevantEventPosition(participantId, currentGameTime);
      const lastRespawn = getMostRecentRespawnWindow(participantId, currentGameTime);

      const latestTimelineTs = latest ? latest.timeSeconds : -1;
      const latestEventTs = latestEventPos ? latestEventPos.timeSeconds : -1;
      if (latestEventTs >= latestTimelineTs && latestEventPos) {
        // No interpolation: icon snaps to latest relevant event position.
        pos = { x: latestEventPos.position.x, y: latestEventPos.position.y };
      } else if (latest) {
        // No interpolation: icon snaps to latest recorded frame position.
        pos = { x: latest.x, y: latest.y };
      } else if (lastRespawn) {
        // If no frame has appeared yet after respawn, keep icon at base.
        pos = getBasePosition(lastRespawn.team);
      } else {
        const firstPoint = points[0];
        pos = firstPoint ? { x: firstPoint.x, y: firstPoint.y } : null;
      }

      if (lastRespawn) {
        const nextAfterRespawn = getFirstPointAfter(points, lastRespawn.respawnTime);
        if (!nextAfterRespawn || currentGameTime < nextAfterRespawn.timeSeconds) {
          pos = getBasePosition(lastRespawn.team);
        }
      }
    }

    if (shouldDraw && pos) {
      const x = (pos.x / 15000) * mapSize * scaleFactor;
      const y = ((15000 - pos.y) / 15000) * mapSize * scaleFactor;
      drawCandidates.push({
        pid,
        participantId,
        x,
        y,
        isDeadVisual
      });
    }
  }

  // Bucket candidates to spread and resize icons when they overlap.
  const bucketGroups = new Map();
  for (const candidate of drawCandidates) {
    const bucketKey = `${Math.round(candidate.x / 10)}:${Math.round(candidate.y / 10)}`;
    if (!bucketGroups.has(bucketKey)) bucketGroups.set(bucketKey, []);
    bucketGroups.get(bucketKey).push(candidate);
  }

  for (const group of bucketGroups.values()) {
    const n = group.length;
    const iconSize = Math.max(16, 32 - (n - 1) * 2);
    const baseRadius = n <= 1 ? 0 : Math.min(26, 6 + (n - 1) * 2);

    group.sort((a, b) => a.participantId - b.participantId);

    for (let i = 0; i < group.length; i++) {
      const candidate = group[i];
      let x = candidate.x;
      let y = candidate.y;

      if (n > 1) {
        const angle = (2 * Math.PI * i) / n;
        x += Math.cos(angle) * baseRadius;
        y += Math.sin(angle) * baseRadius;
      }

      const prevRender = lastRenderedCanvasPosByPid[candidate.participantId];
      if (
        prevRender &&
        (Math.abs(prevRender.x - x) > 0.5 || Math.abs(prevRender.y - y) > 0.5)
      ) {
        const team = champMap[candidate.pid]?.team || "Blue";
        const isDeathToBaseRespawnJump =
          prevRender.wasDeadVisual &&
          !candidate.isDeadVisual &&
          isNearBaseCanvasPosition(x, y, team);

        if (!isDeathToBaseRespawnJump) {
          movementSegments.push({
            x1: prevRender.x,
            y1: prevRender.y,
            x2: x,
            y2: y,
            createdAt: currentGameTime
          });
        }
      }

      imageMode(CENTER);
      let champ = champMap[candidate.pid];
      let icon = champ && champIconMap[champ.name];
      if (icon) {
        strokeWeight(2.5);
        if (candidate.isDeadVisual) {
          stroke(120, 120, 120);
          tint(150, 150, 150, 140);
        } else {
          stroke(champ.team === "Blue" ? color(0, 128, 255) : color(255, 0, 0));
          noTint();
        }
        rect(x - iconSize / 2, y - iconSize / 2, iconSize, iconSize);
        noStroke();
        image(icon, x, y, iconSize, iconSize);
        noTint();
      }
      imageMode(CORNER);
      lastRenderedCanvasPosByPid[candidate.participantId] = {
        x,
        y,
        wasDeadVisual: candidate.isDeadVisual,
        t: currentGameTime
      };
    }
  }

  // Draw movement connectors after icon updates, keep a short fading history.
  movementSegments = movementSegments.filter(
    (segment) => currentGameTime - segment.createdAt <= MOVEMENT_SEGMENT_TTL
  );
  for (const segment of movementSegments) {
    const age = currentGameTime - segment.createdAt;
    const alpha = Math.max(40, 220 - (age / MOVEMENT_SEGMENT_TTL) * 220);
    stroke(240, 240, 240, alpha);
    strokeWeight(2);
    line(segment.x1, segment.y1, segment.x2, segment.y2);
  }
  noStroke();

  renderStatsPanel(grouped);

  for (const e of events) {
    const eventTime = e.timeSeconds;
    if (
      currentGameTime >= eventTime &&
      !displayedEvents.has(e)
    ) {
      displayedEvents.add(e);
      const div = document.createElement("div");
      div.textContent = `${e.time} - ${e.event}`;
      document.getElementById("log").appendChild(div);
    }

  }

  const m = Math.floor(currentGameTime / 60);
  const s = Math.floor(currentGameTime % 60).toString().padStart(2, "0");
  fill(255);
  text(`\u23F1\uFE0F ${m}:${s}`, 10, 20);
}
</script>
</body>
</html>
